# EtrayZ NAS Settings — Factory Defaults
# This file is sourced by shell scripts. Use KEY=VALUE format only.

# --- General ---
TIMEZONE=Europe/Warsaw
DASHBOARD_AUTH=0
BEEP_STARTUP=0
BEEP_PATTERN=double
BEEP_TORRENT=0

# --- Fan ---
FAN_MODE=auto
FAN_SPEED=6

# --- USB ---
USB_ENABLED=1
USB_AUTOMOUNT=1
USBCOPY_ENABLED=1
USBCOPY_TARGET=/home/public/usb-import

# --- Disk 2 (second SATA bay) ---
DISK2_ENABLED=1
DISK2_MOUNT=/home2
DISK2_FORMAT_NEW=1
DISK2_SHARE_ENABLED=1
DISK2_SHARE_NAME=storage
DISK2_SHARE_GUEST=1
DISK2_SHARE_READONLY=0

# --- DLNA ---
DLNA_ENABLED=1
DLNA_NAME="EtrayZ NAS"
DLNA_PORT=8200
DLNA_MEDIA_DIR=/home/public
DLNA_INOTIFY=1

# --- aria2 ---
ARIA2_ENABLED=1
ARIA2_DOWNLOAD_DIR=/home/downloads/complete
ARIA2_MAX_CONCURRENT=3
ARIA2_MAX_CONN=4
ARIA2_UPLOAD_LIMIT=100K
ARIA2_RPC_PORT=6800

# --- Samba ---
SAMBA_WORKGROUP=WORKGROUP
SAMBA_HOME_ENABLED=1
SAMBA_HOME_PATH=/home
SAMBA_HOME_GUEST=0
SAMBA_HOME_READONLY=0
SAMBA_PUBLIC_ENABLED=1
SAMBA_PUBLIC_PATH=/home/public
SAMBA_PUBLIC_GUEST=1
SAMBA_PUBLIC_READONLY=0
SAMBA_DOWNLOADS_ENABLED=1
SAMBA_DOWNLOADS_PATH=/home/downloads/complete
SAMBA_DOWNLOADS_GUEST=1
SAMBA_DOWNLOADS_READONLY=1

# --- Transmission ---
TRANS_ENABLED=1
TRANS_DOWNLOAD_DIR=/home/downloads/complete
TRANS_INCOMPLETE_DIR=/home/downloads/incomplete
TRANS_WATCH_DIR=/home/downloads/watch
TRANS_SPEED_UP=500
TRANS_SPEED_DOWN=0
TRANS_RATIO=2.0
TRANS_PEER_PORT=51413
TRANS_RPC_WHITELIST=192.168.*.*

# --- SSH ---
SSH_PORT=22
SSH_ROOT_LOGIN=1
SSH_PASSWORD_AUTH=1

# --- Web Server ---
DASHBOARD_PORT=70
WEBSITE_PORT=80
WEBSITE_TITLE=My EtrayZ
